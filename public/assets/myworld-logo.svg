<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120">
  <defs>
    <radialGradient id="orb" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#67e8f9"/>
      <stop offset="60%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </radialGradient>
    <radialGradient id="dot" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#a5f3fc"/>
      <stop offset="100%" stop-color="#34d399"/>
    </radialGradient>
  </defs>

  <!-- Fondo -->
  <rect width="120" height="120" fill="#111118" rx="20"/>

  <!-- Logo centrado en (60,60) -->
  <g transform="translate(60, 62)">
    <!-- Círculo principal -->
    <circle cx="0" cy="0" r="42" fill="none" stroke="url(#orb)" stroke-width="1.5" opacity="0.5"/>

    <!-- Arco orbital inclinado -->
    <ellipse cx="0" cy="0" rx="32" ry="9" fill="none"
             stroke="#818cf8" stroke-width="1" opacity="0.3"
             transform="rotate(-25)"/>

    <!-- M estilizada -->
    <path d="M-17,-11 L-17,13 L0,-4 L17,13 L17,-11"
          fill="none" stroke="url(#orb)" stroke-width="2.5"
          stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Punto idea arriba -->
    <circle cx="0" cy="-29" r="5" fill="url(#dot)"/>
    <circle cx="0" cy="-29" r="9" fill="url(#dot)" opacity="0.15"/>

    <!-- Línea punteada -->
    <line x1="0" y1="-24" x2="0" y2="-11"
          stroke="#34d399" stroke-width="1.5"
          stroke-linecap="round" opacity="0.5" stroke-dasharray="2,3"/>
  </g>
</svg>
